<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Get guided support for Australian travel visa pathways with clear steps, fast processing help, and 24/7 assistance."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <title>AUS Visa Service</title>
    <style>
      html.dashboard-route-preload #root {
        visibility: hidden;
      }
    </style>
    <script>
      (function () {
        var path = window.location.pathname.toLowerCase().replace(/\/+$/, '') || '/';
        if (
          path.indexOf('/dashboard') === 0 ||
          path.indexOf('/manager-dashboard') === 0 ||
          path.indexOf('/user-dashboard') === 0 ||
          path === '/login' ||
          path === '/signup'
        ) {
          document.documentElement.classList.add('dashboard-route-preload');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
